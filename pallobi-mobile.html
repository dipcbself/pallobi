        * {

        /* ── Scene ── */
        .scene {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative
        }

        .scene::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 45%, rgba(160, 120, 80, .06) 0%, rgba(80, 60, 40, .025) 35%, transparent 65%);
            pointer-events: none;
            z-index: 0
        }

        .scene::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 70% 20%, rgba(255, 255, 255, 0.05), transparent 40%), radial-gradient(circle at 30% 80%, rgba(200, 180, 120, 0.03), transparent 50%);
            pointer-events: none;
            z-index: 0
        }

        /* ── Header ── */
        .hdr {
            text-align: center;
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeD .8s ease .2s forwards;
            z-index: 4
        }

        .hdr h1 {
            color: #d4c4b0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase
        }

        .hdr .sub {
            color: #998877;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: lowercase;
            font-style: italic;
            margin-top: 5px
        }

        /* ── Zoom HUD ── */
        .zoom-hud {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 18px;
            background: rgba(10, 10, 16, .75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(180, 150, 110, .12);
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            opacity: 0;
            animation: fadeD .6s ease .5s forwards;
            transition: opacity .3s ease, box-shadow .3s ease;
            pointer-events: none
        }

        .zoom-hud.active {
            box-shadow: 0 0 20px rgba(200, 160, 100, .1);
            border-color: rgba(220, 180, 130, .3)
        }

        .zoom-pct {
            font-size: 13px;
            font-weight: 700;
            color: #eeddbb;
            letter-spacing: 1px;
            min-width: 60px;
            text-align: center
        }

        .zoom-label {
            font-size: 7px;
            color: #776655;
            letter-spacing: 2px;
            text-transform: uppercase
        }

        .zoom-bar-track {
            width: 100px;
            height: 3px;
            background: rgba(180, 150, 110, .1);
            border-radius: 2px;
            overflow: hidden
        }

        .zoom-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(200, 160, 100, .4), rgba(220, 180, 130, .7));
            border-radius: 2px;
            transition: width .15s ease
        }

        /* ── Frame & Viewport ── */
        .frame {
            position: relative;
            padding: 2px;
            background: linear-gradient(135deg, rgba(180, 150, 110, .1) 0%, rgba(120, 90, 60, .05) 50%, rgba(180, 150, 110, .1) 100%);
            border-radius: 5px;
            opacity: 0;
            z-index: 3;
            animation: revealArt 1s cubic-bezier(.16, 1, .3, 1) .35s forwards, glow 10s ease-in-out 2.5s infinite
        }

        .frame::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 6px;
            border: 1px solid rgba(255, 220, 180, .08);
            pointer-events: none
        }

        .vp {
            overflow: auto;
            border-radius: 4px;
            background: #0a0a0e;
            max-width: 96vw;
            max-height: 80vh;
            scrollbar-width: thin;
            scrollbar-color: rgba(180, 150, 110, .15) transparent;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y
        }

        .vp::-webkit-scrollbar {
            width: 4px;
            height: 4px
        }

        .vp::-webkit-scrollbar-track {
            background: transparent
        }

        .vp::-webkit-scrollbar-thumb {
            background: rgba(180, 150, 110, .2);
            border-radius: 4px
        }

        .vp::-webkit-scrollbar-thumb:hover {
            background: rgba(180, 150, 110, .35)
        }

        /* ── Canvas Container ── */
        .canvas-wrap {
            position: relative;
            width: 1080px;
            height: 1437px;
            overflow: visible;
            transition: width .12s ease-out, height .12s ease-out
        }

        #artCanvas {
            display: block;
            width: 1080px;
            height: 1437px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            transform-origin: top left;
            will-change: transform;
            transition: transform .12s ease-out
        }

        #artCanvas:hover {
            filter: brightness(1.02)
        }

        /* ── Footer ── */
        .ftr {
            text-align: center;
            margin-top: 14px;
            opacity: 0;
            animation: fadeU 1s ease 1.2s forwards;
            z-index: 4
        }

        .ftr .love {
            color: #c4a882;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase
        }

        .ftr .sub2 {
            color: #887766;
            font-size: 10px;
            letter-spacing: 3px;
            margin-top: 6px
        }

        .ftr .sub2 span {
            color: #cc8866
        }

        /* ── Preloader ── */
        .preloader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #060609;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity .6s ease
        }

        .preloader.hide {
            opacity: 0;
            pointer-events: none
        }

        .preloader .pl-text {
            color: #b8a898;
            font-size: 14px;
            letter-spacing: 6px;
            text-transform: lowercase;
            font-style: italic;
            animation: plPulse 1.5s ease-in-out infinite
        }

        .preloader .pl-dots {
            margin-top: 16px;
            display: flex;
            gap: 6px
        }

        .preloader .pl-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #c4a882;
            animation: plDot 1.2s ease-in-out infinite
        }

        .preloader .pl-dot:nth-child(2) {
            animation-delay: .2s
        }

        .preloader .pl-dot:nth-child(3) {
            animation-delay: .4s
        }

        /* ── Mobile Preloader ── */
        .mobile-preloader {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #060609;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
            transition: opacity .8s ease
        }

        .mobile-preloader.hide {
            opacity: 0;
            pointer-events: none
        }

        .mobile-preloader .mob-img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid rgba(196, 168, 130, .18);
            box-shadow: 0 0 60px rgba(196, 168, 130, .12), 0 0 120px rgba(80, 60, 40, .08);
            margin-bottom: 28px;
            animation: mobImgGlow 4s ease-in-out infinite
        }

        .mobile-preloader .mob-title {
            font-family: 'JetBrains Mono', monospace;
            color: #d4c4b0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 10px
        }

        .mobile-preloader .mob-desc {
            font-family: 'JetBrains Mono', monospace;
            color: #887766;
            font-size: 12px;
            letter-spacing: 3px;
            font-style: italic;
            margin-bottom: 24px
        }

        .mobile-preloader .mob-note {
            font-family: 'JetBrains Mono', monospace;
            color: #776655;
            font-size: 10px;
            letter-spacing: 2px;
            line-height: 1.8;
            max-width: 280px;
            border-top: 1px solid rgba(180, 150, 110, .08);
            padding-top: 16px
        }

        .mobile-preloader .mob-note span {
            color: #c4a882;
            font-style: italic
        }

        .mobile-preloader .mob-dots {
            margin-top: 20px;
            display: flex;
            gap: 6px
        }

        .mobile-preloader .mob-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #c4a882;
            animation: plDot 1.4s ease-in-out infinite
        }

        .mobile-preloader .mob-dot:nth-child(2) {
            animation-delay: .25s
        }

        .mobile-preloader .mob-dot:nth-child(3) {
            animation-delay: .50s
        }

        /* ── Responsive ── */
        @media(max-width:768px) {
            .mobile-preloader {
                display: flex
            }

            .hdr h1 {
                font-size: 14px;
                letter-spacing: 4px
            }

            .hdr .sub {
                font-size: 8px;
                letter-spacing: 3px
            }

            .ftr .love {
                font-size: 12px;
                letter-spacing: 3px
            }

            .ftr .sub2 {
                font-size: 8px
            }

            .scene {
                padding: 2px 0
            }

            .frame {
                padding: 1px;
                border-radius: 2px
            }

            .vp {
                max-width: 98vw;
                max-height: 75vh;
                border-radius: 2px
            }

            .zoom-hud {
                top: 8px;
                padding: 4px 12px;
                gap: 6px;
                border-radius: 14px
            }

            .zoom-pct {
                font-size: 11px;
                min-width: 44px
            }

            .zoom-label {
                font-size: 6px
            }

            .zoom-bar-track {
                width: 60px
            }
        }

        @media(max-width:480px) {
            .hdr h1 {
                font-size: 11px;
                letter-spacing: 3px
            }

            .hdr .sub {
                font-size: 7px;
                letter-spacing: 2px
            }

            .ftr .love {
                font-size: 10px;
                letter-spacing: 2px
            }

            .ftr .sub2 {
                font-size: 7px
            }

            .vp {
                max-width: 100vw;
                max-height: 70vh;
                border-radius: 0
            }

            .scene {
                padding: 4px
            }
        }

        /* ── Keyframes ── */
        @keyframes mobImgGlow {

            0%,
            100% {
                box-shadow: 0 0 40px rgba(196, 168, 130, .10), 0 0 80px rgba(80, 60, 40, .06)
            }

            50% {
                box-shadow: 0 0 80px rgba(196, 168, 130, .22), 0 0 140px rgba(120, 90, 60, .12)
            }
        }

        @keyframes revealArt {
            0% {
                opacity: 0;
                transform: scale(.96) translateY(12px)
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0)
            }
        }

        @keyframes glow {

            0%,
            100% {
                box-shadow: 0 0 50px rgba(140, 100, 60, .05), 0 0 100px rgba(80, 60, 40, .03)
            }

            50% {
                box-shadow: 0 0 70px rgba(160, 120, 70, .08), 0 0 130px rgba(100, 80, 50, .05)
            }
        }

        @keyframes fadeD {
            0% {
                opacity: 0;
                transform: translateY(-10px)
            }

            100% {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeU {
            0% {
                opacity: 0;
                transform: translateY(8px)
            }

            100% {
                opacity: .6;
                transform: translateY(0)
            }
        }

        @keyframes plPulse {

            0%,
            100% {
                opacity: .5
            }

            50% {
                opacity: 1
            }
        }

        @keyframes plDot {

            0%,
            100% {
                transform: scale(.6);
                opacity: .3
            }

            50% {
                transform: scale(1);
                opacity: 1
            }
        }
    </style>
</head>

            var barEl = document.getElementById('zoomBar');
            var MN = 0.15, MX = 25, ZS = 0.08, cz = 0.3, ht = null;

            function uHUD() {
                var p = Math.round(cz * 100);
                pctEl.textContent = p + '%';
                var f = ((Math.log(cz) - Math.log(MN)) / (Math.log(MX) - Math.log(MN))) * 100;
                barEl.style.width = Math.max(0, Math.min(100, f)) + '%';
                hudEl.classList.add('active');
                clearTimeout(ht);
                ht = setTimeout(function () { hudEl.classList.remove('active') }, 600);
            }

            function aZ(nz, px, py) {
                var oz = cz;
                cz = Math.max(MN, Math.min(MX, nz));
                canvas.style.transform = 'scale(' + cz + ')';
                wrap.style.width = (BW * cz) + 'px';
                wrap.style.height = (BH * cz) + 'px';

                    var r = cz / oz;
                    vp.scrollLeft = px * r - (px - vp.scrollLeft);
                    vp.scrollTop = py * r - (py - vp.scrollTop);

                uHUD();

                var r = vp.getBoundingClientRect();

                var my = e.clientY - r.top + vp.scrollTop;

            var fitH = vpH / BH;

            aZ(autoZoom);

            var mpl = document.getElementById('mobilePreloader');
